<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Deal Summary Embed</title>

  <style>
    :root{
      --bg: #f3f4f6;
      --surface: #ffffff;
      --line: #e5e7eb;
      --text: #1f2937;
      --muted: #6b7280;
      --label: #374151;
      --blue: #0176d3;
      --green: #059669;
      --green-bg: #d1fae5;
      --green-text: #065f46;
      --radius: 10px;
      --font: "Salesforce Sans", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    }

    *{ box-sizing: border-box; }
    html, body{
      margin: 0; padding: 0;
      background: transparent;
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .widget{
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
      overflow: hidden;
      max-width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── LOADING OVERLAY ── */
    .loading-overlay {
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.9);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--line);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ERROR BANNER ── */
    .error-banner {
      display: none;
      background: #fef2f2; border-bottom: 1px solid #fecaca;
      padding: 10px 20px; font-size: 14px; color: #b91c1c;
      flex-shrink: 0;
    }
    .error-banner.show { display: block; }

    /* ========== TABS ========== */
    .tabs-bar{
      display: flex; align-items: flex-end;
      gap: 32px; padding: 0 20px;
      border-bottom: 1px solid var(--line);
      background: var(--surface); flex-shrink: 0;
    }
    .tab{
      appearance: none; border: 0; background: transparent;
      font-family: var(--font); font-size: 16.5px;
      padding: 14px 0; color: var(--muted); cursor: pointer;
      position: relative; font-weight: 500;
      transition: color 0.15s ease;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); }
    .tab.active::after{
      content: ""; position: absolute;
      left: 0; right: 0; bottom: -1px;
      height: 2px; background: var(--blue);
    }

    /* ========== TAB CONTENT ========== */
    .tab-content{ display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .tab-content.active{ display: flex; }

    /* ========== TAB 1: LAST CONVERSATION ========== */
    .conversation-header{
      padding: 14px 20px; border-bottom: 1px solid var(--line);
      background: var(--surface); flex-shrink: 0;
    }
    .header-label-row{
      display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
    }
    .header-label{
      font-size: 12.5px; text-transform: uppercase;
      font-weight: 600; letter-spacing: 0.06em; color: var(--muted);
    }
    .header-date-inline{
      font-size: 12.5px; font-weight: 500;
      color: var(--muted); letter-spacing: 0.02em;
    }
    .header-date-inline::before{ content: "·"; margin-right: 8px; opacity: 0.5; }
    .header-contact-name{
      font-size: 20px; font-weight: 600; color: var(--blue);
      cursor: pointer; text-decoration: none; display: block;
    }
    .header-contact-name:hover{ text-decoration: underline; }

    .conversation-body{ padding: 22px 20px 18px 20px; flex: 1; overflow-y: auto; }
    .section{ margin-bottom: 28px; }
    .section:last-child{ margin-bottom: 0; }
    .section-label{
      font-size: 13.5px; text-transform: uppercase;
      font-weight: 600; letter-spacing: 0.05em;
      color: var(--muted); margin-bottom: 10px;
    }

    /* Contact chips */
    .contact-details{ display: flex; gap: 24px; flex-wrap: wrap; }
    .detail-chip{ display: flex; flex-direction: column; gap: 2px; }
    .detail-chip-label{
      font-size: 12.5px; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted); font-weight: 600;
    }
    .detail-chip-value{ font-size: 16px; color: var(--text); font-weight: 500; }

    /* Key points */
    .key-points-section{
      background: #f0f7ff; border: 1px solid #bfdbfe;
      border-radius: 8px; padding: 16px;
    }
    .key-points-header{
      font-size: 17px; font-weight: 600; color: var(--text);
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .key-points-icon{
      width: 20px; height: 20px; background: var(--blue);
      border-radius: 4px; display: flex; align-items: center;
      justify-content: center; color: white; font-size: 14px;
      font-weight: 700; flex-shrink: 0; line-height: 1; padding-bottom: 1px;
    }
    .key-points-list{ margin: 0; padding: 0 0 0 20px; list-style: disc; }
    .key-points-list li{ font-size: 17px; color: var(--text); line-height: 1.7; margin: 9px 0; }
    .key-points-list li::marker{ color: var(--blue); }

    /* Deal info chips row */
    .deal-info-row {
      display: flex; gap: 24px; flex-wrap: wrap;
      margin-bottom: 20px;
    }

    /* ========== NOTE INPUT ========== */
    .update-input-section{
      padding: 16px 20px; border-top: 1px solid var(--line);
      background: white; flex-shrink: 0;
    }
    .input-row{ display: flex; gap: 12px; align-items: flex-start; }
    .input-label{
      font-size: 15px; font-weight: 600; color: var(--text);
      padding-top: 10px; white-space: nowrap;
    }
    .note-textarea{
      flex: 1; min-height: 60px; padding: 10px 12px;
      border: 1px solid var(--line); border-radius: 4px;
      font-family: var(--font); font-size: 15px;
      color: var(--text); resize: vertical;
      transition: border-color 0.15s ease;
    }
    .note-textarea:focus{
      outline: none; border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(1,118,211,0.1);
    }
    .note-textarea::placeholder{ color: var(--muted); }
    .save-btn{
      padding: 10px 32px; background: var(--blue); color: white;
      border: none; border-radius: 4px; font-family: var(--font);
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: background 0.15s ease; white-space: nowrap; align-self: flex-start;
    }
    .save-btn:hover{ background: #0161b3; }
    .save-btn:disabled{ background: #94a3b8; cursor: not-allowed; }

    /* Success Alert */
    .success-alert{
      position: fixed; top: 20px; right: 20px;
      background: #d1fae5; border: 1px solid #6ee7b7;
      border-radius: 6px; padding: 12px 16px;
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 4px 12px rgba(0,0,0,.15); z-index: 1000;
      opacity: 0; transform: translateY(-10px);
      transition: all 0.3s ease; pointer-events: none;
    }
    .success-alert.show{ opacity: 1; transform: translateY(0); pointer-events: auto; }
    .success-icon{
      width: 20px; height: 20px; background: #059669;
      border-radius: 50%; color: white; display: flex;
      align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700;
    }
    .success-text{ font-size: 16px; color: #065f46; font-weight: 600; }

    /* ========== TAB 2: UPDATE HISTORY ========== */
    .timeline-header{
      padding: 12px 20px; border-bottom: 1px solid var(--line);
      background: var(--surface); flex-shrink: 0;
      display: flex; align-items: center; gap: 16px;
    }
    .tl-stat{ display: flex; flex-direction: column; gap: 1px; }
    .tl-stat-value{ font-size: 18px; font-weight: 400; color: var(--text); line-height: 1; }
    .tl-stat-label{
      font-size: 12px; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted); font-weight: 500;
    }
    .tl-divider{ width: 1px; height: 28px; background: var(--line); }

    .timeline-body{ flex: 1; overflow-y: auto; background: #fafbfc; }
    .timeline-track{
      position: relative;
      padding: 20px 20px 20px 52px;
    }
    .timeline-track::before{
      content: ''; position: absolute;
      left: 27px; top: 0; bottom: 0;
      width: 1.5px; background: #e5e7eb;
    }

    .tl-month-header{
      position: relative; display: flex; align-items: center;
      gap: 10px; margin-bottom: 14px; margin-top: 8px;
    }
    .tl-month-header:first-child{ margin-top: 0; }
    .tl-month-dot{
      position: absolute; left: -31px;
      width: 10px; height: 10px; border-radius: 50%;
      background: #fff; border: 1.5px solid #d1d5db;
      top: 50%; transform: translateY(-50%);
    }
    .tl-month-label{
      font-size: 12.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted);
    }
    .tl-month-rule{ flex: 1; height: 1px; background: #f0f0f0; }

    .timeline-item{
      position: relative;
      display: grid; grid-template-columns: 1fr auto;
      gap: 12px; align-items: start;
      padding: 0 0 20px 0; cursor: default;
    }
    .timeline-item:last-child{ padding-bottom: 0; }
    .tl-dot{
      position: absolute; left: -31px; top: 3px;
      width: 10px; height: 10px; border-radius: 50%;
      border: 2px solid #fff; box-shadow: 0 0 0 1.5px currentColor;
      flex-shrink: 0; z-index: 1;
    }
    .timeline-item.interested    .tl-dot { background: #10b981; color: #10b981; }
    .timeline-item.warm          .tl-dot { background: #f59e0b; color: #f59e0b; }
    .timeline-item.no-answer     .tl-dot { background: #94a3b8; color: #94a3b8; }
    .timeline-item.not-interested .tl-dot { background: #ef4444; color: #ef4444; }
    .timeline-item.default       .tl-dot { background: #6b7280; color: #6b7280; }

    .tl-body{ display: flex; flex-direction: column; gap: 5px; min-width: 0; }
    .tl-top-row{ display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .tl-contact{ font-size: 15.5px; font-weight: 600; color: var(--blue); }
    .tl-badge{
      display: inline-flex; padding: 2px 8px;
      border-radius: 999px; font-size: 12px;
      font-weight: 600; letter-spacing: 0.02em;
    }
    .tl-badge.interested    { background: #d1fae5; color: #065f46; }
    .tl-badge.warm          { background: #fef3c7; color: #92400e; }
    .tl-badge.no-answer     { background: #f1f5f9; color: #475569; }
    .tl-badge.not-interested{ background: #fee2e2; color: #991b1b; }
    .tl-badge.default       { background: #f3f4f6; color: #374151; }

    .tl-latest-tag{
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--blue); background: #e0f2fe;
      border-radius: 999px; padding: 2px 7px;
    }
    .tl-latest-dot{
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--blue); animation: pulse 2s infinite;
    }
    @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:0.4} }

    .tl-notes{ margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 2px; }
    .tl-notes li{
      font-size: 14px; color: #6b7280; line-height: 1.5;
      display: flex; align-items: baseline; gap: 5px;
    }
    .tl-notes li::before{ content: "·"; color: #d1d5db; flex-shrink: 0; font-size: 14px; line-height: 1; }

    .tl-date-col{
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 1px;
      white-space: nowrap; padding-top: 2px;
    }
    .tl-date-main{ font-size: 14px; color: var(--text); font-weight: 500; }
    .tl-date-rel{ font-size: 12.5px; color: var(--muted); }

    /* ========== TAB 3: DEAL HIGHLIGHTS ========== */
    .highlights-header{
      padding: 16px 20px; border-bottom: 1px solid var(--line);
      background: var(--surface); flex-shrink: 0;
    }
    .highlights-meta{ font-size: 14.5px; color: var(--muted); display: flex; gap: 10px; }
    .highlights-body{ flex: 1; overflow-y: auto; background: #fafbfc; }
    .highlights-track{
      position: relative;
      padding: 24px 20px 24px 28px;
    }
    .highlights-track::before{
      content: ''; position: absolute;
      left: 14px; top: 32px; bottom: 32px;
      width: 1px; background: #d1d5db;
    }
    .highlight-item{
      position: relative; margin-bottom: 20px;
      background: white; border: 1px solid var(--line);
      border-radius: 8px; padding: 16px 18px;
      transition: all 0.2s ease;
    }
    .highlight-item:hover{ box-shadow: 0 4px 12px rgba(0,0,0,.08); transform: translateY(-1px); }
    .highlight-item:last-child{ margin-bottom: 0; }
    .highlight-dot{
      position: absolute; left: -20px; top: 20px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--blue); border: 2px solid var(--blue);
      z-index: 1; box-shadow: 0 0 0 3px white;
    }
    .highlight-header{
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 10px;
    }
    .highlight-author{ font-size: 16px; font-weight: 600; color: var(--text); }
    .highlight-date{ font-size: 14.5px; color: var(--muted); }
    .highlight-text{ font-size: 16px; color: var(--text); line-height: 1.6; white-space: pre-wrap; }

    .empty-state{ text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state-icon{ font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
    .empty-state-text{ font-size: 17px; font-weight: 500; }

    /* ── Scrollbar ── */
    .conversation-body::-webkit-scrollbar,
    .timeline-body::-webkit-scrollbar,
    .highlights-body::-webkit-scrollbar { width: 5px; }
    .conversation-body::-webkit-scrollbar-track,
    .timeline-body::-webkit-scrollbar-track,
    .highlights-body::-webkit-scrollbar-track { background: transparent; }
    .conversation-body::-webkit-scrollbar-thumb,
    .timeline-body::-webkit-scrollbar-thumb,
    .highlights-body::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    .conversation-body::-webkit-scrollbar-thumb:hover,
    .timeline-body::-webkit-scrollbar-thumb:hover,
    .highlights-body::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>

<body>
  <!-- LOADING -->
  <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

  <div class="widget">
    <!-- ERROR BANNER -->
    <div class="error-banner" id="errorBanner">⚠ Could not load deal data. Showing placeholder content.</div>

    <!-- SUCCESS ALERT -->
    <div class="success-alert" id="successAlert">
      <div class="success-icon">✓</div>
      <div class="success-text" id="successText">Note saved to Monday.com</div>
    </div>

    <!-- TABS -->
    <div class="tabs-bar">
      <button class="tab active" data-tab="conversation">Last Conversation</button>
      <button class="tab" data-tab="history">Update History</button>
      <button class="tab" data-tab="highlights">Deal Notes</button>
    </div>

    <!-- ===== TAB 1: LAST CONVERSATION ===== -->
    <div class="tab-content active" id="conversation-tab">
      <div class="conversation-header">
        <div class="header-label-row">
          <span class="header-label">Last Meaningful Contact</span>
          <span class="header-date-inline" id="conversationDate">—</span>
        </div>
        <a href="#" class="header-contact-name" id="contactName">Loading…</a>
      </div>

      <div class="conversation-body">
        <!-- Contact Details -->
        <div class="section">
          <div class="section-label">Contact Details</div>
          <div class="contact-details" id="contactDetailsRow">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- Key Points -->
        <div class="key-points-section">
          <div class="key-points-header">
            <div class="key-points-icon">★</div>
            <span>Key Conversation Points</span>
          </div>
          <ul class="key-points-list" id="keyPointsList">
            <li style="color:var(--muted)">Loading key points…</li>
          </ul>
        </div>
      </div>

      <!-- Quick Note -->
      <div class="update-input-section">
        <div class="input-row">
          <div class="input-label">Quick Note</div>
          <textarea class="note-textarea" id="quickNoteInput"
            placeholder="Add a note about this deal…" rows="2"></textarea>
          <button class="save-btn" id="saveQuickNote">Save</button>
        </div>
      </div>
    </div>

    <!-- ===== TAB 2: UPDATE HISTORY ===== -->
    <div class="tab-content" id="history-tab">
      <div class="timeline-header">
        <div class="tl-stat">
          <span class="tl-stat-value" id="totalConversations">—</span>
          <span class="tl-stat-label">Notes</span>
        </div>
        <div class="tl-divider"></div>
        <div class="tl-stat">
          <span class="tl-stat-value" id="lastUpdate">—</span>
          <span class="tl-stat-label">Last Update</span>
        </div>
      </div>
      <div class="timeline-body">
        <div class="timeline-track" id="timelineContainer"></div>
      </div>
    </div>

    <!-- ===== TAB 3: DEAL NOTES ===== -->
    <div class="tab-content" id="highlights-tab">
      <div class="highlights-header">
        <div class="highlights-meta">
          <span><strong id="totalHighlights">0</strong> deal notes</span>
        </div>
      </div>
      <div class="highlights-body">
        <div class="highlights-track" id="highlightsContainer">
          <div class="empty-state" id="emptyState">
            <div class="empty-state-icon">📝</div>
            <div class="empty-state-text">No deal notes yet</div>
          </div>
        </div>
      </div>
      <div class="update-input-section">
        <div class="input-row">
          <div class="input-label">Add Note</div>
          <textarea class="note-textarea" id="highlightNoteInput"
            placeholder="Add a note about this deal…" rows="2"></textarea>
          <button class="save-btn" id="saveHighlightNote">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    //  CONFIGURATION
    // ============================================================
    const LOAD_WEBHOOK_URL = "https://hook.us1.make.com/3spufybkajebciu4vjz51fcuwlncm0e8";
    const MAKE_WEBHOOK_URL = "https://hook.us1.make.com/wfh5ezjw929dnmyaeu8zlnt1uwl6ewkn";
    //  This is the item_id passed from Monday via the iframe URL
    //  Monday URL param format: ?item_id=123456&board_id=789
    // ============================================================

    function escapeHtml(str) {
      if (str === null || str === undefined) return '';
      const d = document.createElement('div');
      d.textContent = String(str);
      return d.innerHTML;
    }

    // ── Helper: relative time ──
    function relativeTime(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      if (isNaN(d)) return dateStr;
      const diff = Math.floor((Date.now() - d) / 86400000);
      if (diff === 0) return 'Today';
      if (diff === 1) return 'Yesterday';
      if (diff < 7) return `${diff} days ago`;
      if (diff < 30) return `${Math.floor(diff/7)} weeks ago`;
      return `${Math.floor(diff/30)} months ago`;
    }

    // ── Status → CSS class ──
    function statusClass(status) {
      if (!status) return 'default';
      const s = status.toLowerCase();
      if (s.includes('interested') && !s.includes('not')) return 'interested';
      if (s.includes('warm')) return 'warm';
      if (s.includes('no answer') || s.includes('no-answer')) return 'no-answer';
      if (s.includes('not interested')) return 'not-interested';
      return 'default';
    }

    // ── Format date nicely ──
    function fmtDate(dateStr) {
      if (!dateStr) return '—';
      const d = new Date(dateStr);
      if (isNaN(d)) return dateStr;
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function getMonthYear(dateStr) {
      if (!dateStr) return 'Unknown';
      const d = new Date(dateStr);
      if (isNaN(d)) return dateStr;
      return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    }

    // ── State ──
    let src = {};
    let dealHighlights = [];

    // ── DEMO fallback (used when no item_id in URL) ──
    const DEMO = {
      item_id: 'DEMO', board_id: '',
      deal_name: 'McCrory Property', deal_status: 'Interested', deal_value: '$90k',
      contact_name: 'Rebeca McCrory', conv_date: '2026-02-17',
      lead_status: 'Interested in Selling', relationship: 'Daughter', ownership: '20%',
      key_points: 'Confirmed she can sign on behalf of siblings (has POA)|Needs offer by end of month for tax deadline|Prefers email communication over phone|Mentioned property needs $15k in repairs',
      timeline: [
        { date: '2026-02-18', contact: 'Rebeca McCrory', status: 'Interested', notes: ['Agreed to $90k offer', 'Will sign next week'] },
        { date: '2026-02-15', contact: 'Rebeca McCrory', status: 'Warm',       notes: ['Needs more time to think', 'Will get back by Friday'] },
        { date: '2026-02-11', contact: 'Rebeca McCrory', status: 'Interested', notes: ['Has POA for siblings', 'Needs offer by end of month'] },
        { date: '2026-02-10', contact: 'Sarah McCrory',  status: 'Interested', notes: ['Supports sale decision'] },
        { date: '2026-02-08', contact: 'Rebeca McCrory', status: 'No Answer',  notes: ['Left voicemail'] },
        { date: '2026-02-05', contact: 'John McCrory',   status: 'Not Interested', notes: ['Referred to Rebeca as decision maker'] }
      ],
      highlights: []
    };

    // ── Render all tabs from src ──
    function renderAll() {
      // Tab 1
      document.getElementById('conversationDate').textContent = fmtDate(src.conv_date);
      document.getElementById('contactName').textContent = src.contact_name || '—';

      const contactChips = [
        { label: 'Lead Status',  value: src.lead_status  },
        { label: 'Relationship', value: src.relationship },
        { label: 'Ownership',    value: src.ownership    }
      ].filter(c => c.value);
      document.getElementById('contactDetailsRow').innerHTML = contactChips.map(c => `
        <div class="detail-chip">
          <span class="detail-chip-label">${escapeHtml(c.label)}</span>
          <span class="detail-chip-value">${escapeHtml(c.value)}</span>
        </div>`).join('');

      // Key points — pipe-delimited string OR already parsed array
      const kpRaw = src.key_points || '';
      const keyPoints = Array.isArray(kpRaw)
        ? kpRaw
        : kpRaw.split('|').map(s => s.trim()).filter(Boolean);
      document.getElementById('keyPointsList').innerHTML = keyPoints.length
        ? keyPoints.map(p => `<li>${escapeHtml(p)}</li>`).join('')
        : '<li style="color:var(--muted)">No conversation notes yet.</li>';

      // Tab 2 — timeline
      let timelineUpdates = [];
      try {
        timelineUpdates = Array.isArray(src.timeline)
          ? src.timeline
          : JSON.parse(src.timeline || '[]');
      } catch(e) {}

      document.getElementById('totalConversations').textContent = timelineUpdates.length || '0';
      document.getElementById('lastUpdate').textContent = timelineUpdates[0]
        ? relativeTime(timelineUpdates[0].date) : '—';

      const timelineContainer = document.getElementById('timelineContainer');
      if (timelineUpdates.length === 0) {
        timelineContainer.innerHTML = `<div class="empty-state">
          <div class="empty-state-icon">📋</div>
          <div class="empty-state-text">No update history yet</div>
        </div>`;
      } else {
        let lastMonth = null, html = '';
        timelineUpdates.forEach((u, i) => {
          const month = getMonthYear(u.date);
          if (month !== lastMonth) {
            html += `<div class="tl-month-header">
              <div class="tl-month-dot"></div>
              <span class="tl-month-label">${escapeHtml(month)}</span>
              <div class="tl-month-rule"></div>
            </div>`;
            lastMonth = month;
          }
          const sc = statusClass(u.status);
          const notes = Array.isArray(u.notes) ? u.notes : (u.notes ? [u.notes] : []);
          html += `<div class="timeline-item ${sc}">
            <div class="tl-dot"></div>
            <div class="tl-body">
              <div class="tl-top-row">
                <span class="tl-contact">${escapeHtml(u.contact)}</span>
                <span class="tl-badge ${sc}">${escapeHtml(u.status || 'Update')}</span>
                ${i === 0 ? `<span class="tl-latest-tag"><span class="tl-latest-dot"></span>Latest</span>` : ''}
              </div>
              <ul class="tl-notes">
                ${notes.map(n => `<li>${escapeHtml(n)}</li>`).join('')}
              </ul>
            </div>
            <div class="tl-date-col">
              <span class="tl-date-main">${escapeHtml(fmtDate(u.date))}</span>
              <span class="tl-date-rel">${escapeHtml(relativeTime(u.date))}</span>
            </div>
          </div>`;
        });
        timelineContainer.innerHTML = html;
      }

      // Tab 3 — highlights
      try {
        dealHighlights = Array.isArray(src.highlights)
          ? src.highlights
          : JSON.parse(src.highlights || '[]');
      } catch(e) { dealHighlights = []; }
      renderHighlights();
    }

    // ── Render Deal Notes tab ──
    function renderHighlights() {
      const container = document.getElementById('highlightsContainer');
      const totalEl   = document.getElementById('totalHighlights');
      totalEl.textContent = dealHighlights.length;
      if (dealHighlights.length === 0) {
        container.innerHTML = `<div class="empty-state">
          <div class="empty-state-icon">📝</div>
          <div class="empty-state-text">No deal notes yet</div>
        </div>`;
        return;
      }
      container.innerHTML = dealHighlights.map(h => `
        <div class="highlight-item">
          <div class="highlight-dot"></div>
          <div class="highlight-header">
            <span class="highlight-author">${escapeHtml(h.author || 'You')}</span>
            <span class="highlight-date">${escapeHtml(fmtDate(h.date))} · ${escapeHtml(relativeTime(h.date))}</span>
          </div>
          <div class="highlight-text">${escapeHtml(h.text)}</div>
        </div>`).join('');
    }

    // -- LOAD: fetch deal data from Make on page load --
    async function loadDealData() {
      // Handles all Monday URL formats:
      // Format A (standard):  ?item_id=111&board_id=222
      // Format B (Monday):    ?222/pulses/111
      // Format C (mixed):     ?222/item_id=111
      // Format D (bare):      ?222/111
      const raw    = window.location.search.replace('?', '');
      const params = new URLSearchParams(window.location.search);

      let item_id  = params.get('item_id')  || params.get('pulseId') || null;
      let board_id = params.get('board_id') || params.get('boardId') || '';

      // Format B: ?boardId/pulses/itemId
      if (!item_id) {
        const pulseMatch = raw.match(/(\d+)\/pulses\/(\d+)/);
        if (pulseMatch) { board_id = pulseMatch[1]; item_id = pulseMatch[2]; }
      }

      // Format C: ?boardId/item_id=itemId
      if (!item_id) {
        const mixedMatch = raw.match(/(\d+)\/item_id=(\d+)/);
        if (mixedMatch) { board_id = mixedMatch[1]; item_id = mixedMatch[2]; }
      }

      // Format D: ?boardId/itemId  (bare numbers)
      if (!item_id) {
        const bareMatch = raw.match(/(\d+)\/(\d+)/);
        if (bareMatch) { board_id = bareMatch[1]; item_id = bareMatch[2]; }
      }

      if (!item_id) {
        // No item_id found in any format -> demo mode
        src = DEMO;
        document.getElementById('errorBanner').textContent = 'Demo mode -- add ?item_id=XXX&board_id=YYY to the URL to load live data.';
        document.getElementById('errorBanner').classList.add('show');
        renderAll();
        return;
      }

      try {
        const res = await fetch(LOAD_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ item_id, board_id })
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        src = await res.json();
        renderAll();
      } catch(err) {
        // Webhook failed — fall back to demo and show warning
        src = DEMO;
        document.getElementById('errorBanner').textContent = `⚠ Could not load live data (${err.message}). Showing demo content.`;
        document.getElementById('errorBanner').classList.add('show');
        renderAll();
      }
    }

    // ── SAVE NOTE → Make.com webhook ──
    async function saveNote(text, textarea) {
      if (!text) return;
      const activeBtn = document.activeElement;
      activeBtn.disabled = true;
      activeBtn.textContent = 'Saving…';

      const payload = {
        action: 'add_note',
        item_id:   src.item_id,
        board_id:  src.board_id,
        note:      text,
        timestamp: new Date().toISOString()
      };

      try {
        await fetch(MAKE_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        showSuccess('Note saved to Monday.com ✓');
      } catch(err) {
        showSuccess('Saved locally (check webhook)');
      } finally {
        activeBtn.disabled = false;
        activeBtn.textContent = 'Save';
      }

      // Always add optimistically
      dealHighlights.unshift({ date: new Date().toISOString(), author: 'You', text });
      renderHighlights();
      textarea.value = '';
    }

    function showSuccess(msg) {
      document.getElementById('successText').textContent = msg;
      const el = document.getElementById('successAlert');
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 3000);
    }

    document.getElementById('saveQuickNote').addEventListener('click', () => {
      const ta = document.getElementById('quickNoteInput');
      saveNote(ta.value.trim(), ta);
    });
    document.getElementById('saveHighlightNote').addEventListener('click', () => {
      const ta = document.getElementById('highlightNoteInput');
      saveNote(ta.value.trim(), ta);
    });

    // ── Tab switching ──
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(`${tab.dataset.tab}-tab`).classList.add('active');
      });
    });

    // ── Boot: load data then hide spinner ──
    loadDealData().finally(() => {
      const overlay = document.getElementById('loadingOverlay');
      overlay.classList.add('hidden');
      setTimeout(() => overlay.remove(), 400);
    });
  </script>
</body>
</html>
